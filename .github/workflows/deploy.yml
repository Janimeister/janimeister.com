name: Deploy to GitHub Pages

on:
  # Only deploy after the Tests workflow passes on main.
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  # Allow manual runs and the daily refresh to bypass the test gate.
  workflow_dispatch:
  schedule:
    # Refresh the static videos.json daily so the page picks up new uploads
    # even when no commits land.
    - cron: '17 5 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # For workflow_run events, only proceed if tests passed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.9
          cache: npm

      - run: npm ci

      - name: Compute base path
        id: base
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          if [ -f "CNAME" ] || [ -f "public/CNAME" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.base.outputs.base }}
          VITE_VIDEO_API: ${{ vars.VITE_VIDEO_API }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: npm run build

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
