name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh the static videos.json daily so the page picks up new uploads
    # even when no commits land.
    - cron: '17 5 * * *'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: 24

jobs:
  tests:
    name: Tests
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
      actions: write

  build:
    name: Build
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Compute base path
        id: base
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          if [ -f "CNAME" ] || [ -f "public/CNAME" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.base.outputs.base }}
          VITE_VIDEO_API: ${{ vars.VITE_VIDEO_API }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: npm run build

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
